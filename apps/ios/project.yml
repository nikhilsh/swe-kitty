name: SweKitty

options:
  bundleIdPrefix: sh.nikhil
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    DEVELOPMENT_TEAM: EHW7L3679R
    SWIFT_VERSION: "5.10"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    MARKETING_VERSION: "0.0.1"
    CURRENT_PROJECT_VERSION: "13"

packages:
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: 8.55.0
  SnapshotTesting:
    # Point-Free's swift-snapshot-testing. De facto standard for
    # iOS visual regression — image + accessibility + text snapshots.
    # Test-target dep only; never linked into the app.
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: 1.17.0
  HighlightSwift:
    # SwiftUI wrapper around highlight.js. Matches litter's code-block
    # rendering so fenced ``` swift / ts / py / ... blocks and diff
    # lines pick up syntax color instead of flat monospace. See
    # docs/PLAN-2026-05-19.md "Code block view with syntax
    # highlighting (HighlightSwift on iOS, Prism4j on Android)".
    # `Sources/Views/SyntaxHighlighting.swift` gates usage behind
    # `#if canImport(HighlightSwift)` so removing this line still
    # leaves a working monospace fallback if the package ever stalls
    # the SPM resolve.
    url: https://github.com/appstefan/highlightswift
    from: 1.1.0
  GhosttyVT:
    # Stage 1 of docs/PLAN-TERMINAL-REWRITE.md. Local SPM package at
    # apps/ios/GhosttyVT/ hosts a binaryTarget pointing at the
    # ghostty-vt.xcframework release asset (URL + sha256 pinned in
    # Package.swift, mirrored in scripts/fetch-ghostty-vt-xcframework.sh).
    # `Sources/GhosttyVT/Terminal.swift` gates every libghostty
    # symbol behind `#if canImport(GhosttyVt)` so the iOS app still
    # builds if SPM fails to resolve the binary asset (e.g. upstream
    # rotated the `tip` tag and the pinned checksum is stale).
    path: GhosttyVT

targets:
  SweKitty:
    type: application
    platform: iOS
    sources:
      - path: Sources
        excludes:
          - "Resources/terminal/**"
      - path: SweKittyCore/Sources
        optional: true
      - path: Sources/Assets.xcassets
      # Vendored xterm.js bundle. Added as a `folder` so the directory
      # structure (terminal/xterm.js, terminal.html, …) is preserved
      # inside the .app — WKTerminalView loads them with
      # Bundle.main.url(forResource: "terminal", withExtension: "html",
      # subdirectory: "terminal").
      - path: Sources/Resources/terminal
        type: folder
        buildPhase: resources
    dependencies:
      - framework: SweKittyCore/SweKittyCore.xcframework
        embed: true
        codeSign: true
      - package: Sentry
      - package: HighlightSwift
      - package: GhosttyVT
      # Bundle the widget extension inside the host .app so iOS picks
      # it up when the controller calls Activity.request(...). Without
      # this `embed: true` the extension target builds in isolation
      # but the system can't find it at runtime.
      - target: SweKittyWidgets
        embed: true
        codeSign: true
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: SweKitty
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSCameraUsageDescription: "Scan SweKitty pairing QR codes."
        NSPhotoLibraryUsageDescription: "Import a SweKitty pairing QR code from your photo library."
        NSMicrophoneUsageDescription: "Dictate replies to the coding agent."
        NSSpeechRecognitionUsageDescription: "Transcribe your voice on-device into chat messages for the coding agent."
        NSLocalNetworkUsageDescription: "Discover SweKitty harnesses advertising on your Wi-Fi."
        NSBonjourServices:
          - "_swe-kitty._tcp"
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLName: sh.nikhil.swekitty.pairing
            CFBundleURLSchemes:
              - swekitty
        # Required by iOS so the app may call Activity.request(...) to
        # surface the active turn on the lock screen / Dynamic Island.
        # See apps/ios/Sources/Models/TurnLiveActivityController.swift.
        NSSupportsLiveActivities: true
        SentryDSN: $(SENTRY_DSN)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: sh.nikhil.swekitty
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_MODULE_VERIFIER: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SENTRY_DSN: ""

  # Widget app-extension that renders the Turn Live Activity on the
  # lock screen and Dynamic Island. The controller in
  # Sources/Models/TurnLiveActivityController.swift calls
  # Activity.request(...) at runtime; without this extension target
  # iOS silently drops the request and no UI appears. The widget
  # re-compiles the same TurnActivityAttributes shape (Widgets/Shared
  # mirrors the model file via xcodegen `sources`) so both processes
  # agree on the Codable layout.
  SweKittyWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.1"
    sources:
      - path: Widgets
      # ActivityAttributes type must be compiled into BOTH the host
      # app and the widget extension so the generic `Activity<TurnActivityAttributes>`
      # resolves to the same concrete type on either side of the system
      # boundary. The controller class itself stays in the host target —
      # it references `SessionStore` / `ConversationItem` which the
      # widget extension can't (and shouldn't) link.
      - path: Sources/Models/TurnActivityModel.swift
      - path: Sources/Models/TurnActivityAttributes.swift
    info:
      path: Widgets/Info.plist
      properties:
        CFBundleDisplayName: SweKittyWidgets
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        # Modern WidgetKit extensions use a `@main WidgetBundle` —
        # no `NSExtensionPrincipalClass` needed. Just declare the
        # extension point so iOS routes the bundle.
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: sh.nikhil.swekitty.widgets
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        GENERATE_INFOPLIST_FILE: NO
        SKIP_INSTALL: NO
        # Extension ships with the host .app and must not require its
        # own signing identity for sim/CI builds.
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO

  SweKittyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/SweKittyTests
    dependencies:
      - target: SweKitty
      - package: SnapshotTesting
        product: SnapshotTesting
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: sh.nikhil.swekitty.tests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/SweKitty.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/SweKitty
        # Test target doesn't ship; skip the team-id requirement so
        # local + CI builds don't need signing material configured.
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO

schemes:
  SweKitty:
    build:
      targets:
        SweKitty: all
        SweKittyWidgets: all
        SweKittyTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: false
      targets:
        - SweKittyTests
    archive:
      config: Release
