name: SweKitty

options:
  bundleIdPrefix: sh.nikhil
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    DEVELOPMENT_TEAM: EHW7L3679R
    SWIFT_VERSION: "5.10"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    MARKETING_VERSION: "0.0.1"
    CURRENT_PROJECT_VERSION: "13"

packages:
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: 8.55.0
  SnapshotTesting:
    # Point-Free's swift-snapshot-testing. De facto standard for
    # iOS visual regression — image + accessibility + text snapshots.
    # Test-target dep only; never linked into the app.
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: 1.17.0
  HighlightSwift:
    # SwiftUI wrapper around highlight.js. Matches litter's code-block
    # rendering so fenced ``` swift / ts / py / ... blocks and diff
    # lines pick up syntax color instead of flat monospace. See
    # docs/PLAN-2026-05-19.md "Code block view with syntax
    # highlighting (HighlightSwift on iOS, Prism4j on Android)".
    # `Sources/Views/SyntaxHighlighting.swift` gates usage behind
    # `#if canImport(HighlightSwift)` so removing this line still
    # leaves a working monospace fallback if the package ever stalls
    # the SPM resolve.
    url: https://github.com/appstefan/highlightswift
    from: 1.1.0

targets:
  SweKitty:
    type: application
    platform: iOS
    sources:
      - path: Sources
        excludes:
          - "Resources/terminal/**"
      - path: SweKittyCore/Sources
        optional: true
      - path: Sources/Assets.xcassets
      # Vendored xterm.js bundle. Added as a `folder` so the directory
      # structure (terminal/xterm.js, terminal.html, …) is preserved
      # inside the .app — WKTerminalView loads them with
      # Bundle.main.url(forResource: "terminal", withExtension: "html",
      # subdirectory: "terminal").
      - path: Sources/Resources/terminal
        type: folder
        buildPhase: resources
    dependencies:
      - framework: SweKittyCore/SweKittyCore.xcframework
        embed: true
        codeSign: true
      - package: Sentry
      - package: HighlightSwift
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: SweKitty
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSCameraUsageDescription: "Scan SweKitty pairing QR codes."
        NSPhotoLibraryUsageDescription: "Import a SweKitty pairing QR code from your photo library."
        NSMicrophoneUsageDescription: "Dictate replies to the coding agent."
        NSSpeechRecognitionUsageDescription: "Transcribe your voice on-device into chat messages for the coding agent."
        NSLocalNetworkUsageDescription: "Discover SweKitty harnesses advertising on your Wi-Fi."
        NSBonjourServices:
          - "_swe-kitty._tcp"
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLName: sh.nikhil.swekitty.pairing
            CFBundleURLSchemes:
              - swekitty
        SentryDSN: $(SENTRY_DSN)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: sh.nikhil.swekitty
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_MODULE_VERIFIER: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SENTRY_DSN: ""

  SweKittyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/SweKittyTests
    dependencies:
      - target: SweKitty
      - package: SnapshotTesting
        product: SnapshotTesting
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: sh.nikhil.swekitty.tests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/SweKitty.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/SweKitty
        # Test target doesn't ship; skip the team-id requirement so
        # local + CI builds don't need signing material configured.
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO

schemes:
  SweKitty:
    build:
      targets:
        SweKitty: all
        SweKittyTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: false
      targets:
        - SweKittyTests
    archive:
      config: Release
