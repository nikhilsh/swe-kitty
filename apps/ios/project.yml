name: SweKitty

options:
  bundleIdPrefix: sh.nikhil
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    DEVELOPMENT_TEAM: EHW7L3679R
    SWIFT_VERSION: "5.10"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    MARKETING_VERSION: "0.0.1"
    CURRENT_PROJECT_VERSION: "13"

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    # Bumped from 1.2.4 → 1.13.0 to pick up the iOS rendering fix that
    # uses contentOffset.y for firstRow (v1.12) — fixes the garbled
    # scrollback rendering with claude TUI seen in the polish3 sideload.
    from: 1.13.0
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: 8.55.0

targets:
  SweKitty:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: SweKittyCore/Sources
        optional: true
      - path: Sources/Assets.xcassets
    dependencies:
      - framework: SweKittyCore/SweKittyCore.xcframework
        embed: true
        codeSign: true
      - package: SwiftTerm
      - package: Sentry
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: SweKitty
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSCameraUsageDescription: "Scan SweKitty pairing QR codes."
        NSPhotoLibraryUsageDescription: "Import a SweKitty pairing QR code from your photo library."
        NSMicrophoneUsageDescription: "Dictate replies to the coding agent."
        NSSpeechRecognitionUsageDescription: "Transcribe your voice on-device into chat messages for the coding agent."
        NSLocalNetworkUsageDescription: "Discover SweKitty harnesses advertising on your Wi-Fi."
        NSBonjourServices:
          - "_swe-kitty._tcp"
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLName: sh.nikhil.swekitty.pairing
            CFBundleURLSchemes:
              - swekitty
        SentryDSN: $(SENTRY_DSN)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: sh.nikhil.swekitty
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_MODULE_VERIFIER: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SENTRY_DSN: ""

schemes:
  SweKitty:
    build:
      targets:
        SweKitty: all
    run:
      config: Debug
    archive:
      config: Release
