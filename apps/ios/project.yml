name: Conduit

options:
  bundleIdPrefix: sh.nikhil
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    DEVELOPMENT_TEAM: EHW7L3679R
    SWIFT_VERSION: "5.10"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    MARKETING_VERSION: "0.0.1"
    CURRENT_PROJECT_VERSION: "13"
    # Always emit a dSYM bundle (not just inline DWARF) so release
    # archives carry symbol files Sentry can use to symbolicate crashes.
    # Xcode defaults Release to dwarf-with-dsym, but pin it explicitly so
    # the archive's dSYMs/ dir is guaranteed — an EXC_BAD_ACCESS shipped
    # with no symbols (Sentry issue 7514301521) traced back to missing
    # debug-file upload, and this removes one variable from that chain.
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

packages:
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: 8.55.0
  SnapshotTesting:
    # Point-Free's swift-snapshot-testing. De facto standard for
    # iOS visual regression — image + accessibility + text snapshots.
    # Test-target dep only; never linked into the app.
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: 1.17.0
  HighlightSwift:
    # SwiftUI wrapper around highlight.js. Matches upstream's code-block
    # rendering so fenced ``` swift / ts / py / ... blocks and diff
    # lines pick up syntax color instead of flat monospace. See
    # docs/PLAN-2026-05-19.md "Code block view with syntax
    # highlighting (HighlightSwift on iOS, Prism4j on Android)".
    # `Sources/Views/SyntaxHighlighting.swift` gates usage behind
    # `#if canImport(HighlightSwift)` so removing this line still
    # leaves a working monospace fallback if the package ever stalls
    # the SPM resolve.
    url: https://github.com/appstefan/highlightswift
    from: 1.1.0
  GhosttyVT:
    # Stage 2-unblock of docs/PLAN-TERMINAL-REWRITE.md. Local SPM
    # package at apps/ios/GhosttyVT/ hosts a binaryTarget pointing at
    # the VENDORED multi-arch xcframework from Lakr233/libghostty-spm
    # at apps/ios/GhosttyVT/Vendor/GhosttyKit.xcframework.zip. As of
    # 2026-05-28 we vendor the binary rather than URL-pin against
    # storage.<version> tags — Lakr233 mutates those tags in place
    # (storage.1.1.5 deleted, storage.1.2.1 asset renamed), which
    # broke iOS builds three times in 36 hours. See Package.swift's
    # header for the bump procedure (run
    # scripts/fetch-ghostty-kit-xcframework.sh bump <tag>). Replaces
    # the upstream `tip` `ghostty-vt.xcframework.zip` which only
    # shipped an `ios-arm64/` slice (PR #94 had to disable that
    # binaryTarget; the iOS-simulator linker rejected the arm64-only
    # archive).
    # Stage 4 (ghostty-bridge-app-surface-v3) rewrote the wrapper
    # against the App/Surface C ABI (`ghostty_app_new`,
    # `ghostty_surface_new`, `ghostty_surface_write_buffer`, …) and
    # flipped the canImport gate to `canImport(libghostty)` — the
    # correct module name per the xcframework's umbrella modulemap.
    # `Terminal.isAvailable` now reads `true` at runtime once
    # `GhosttyApp.shared` initializes, the experimental terminal
    # flag's CoreText renderer paints "libghostty alive — App=0x…"
    # in its empty-grid status overlay, and PTY bytes flow into
    # `ghostty_surface_write_buffer` instead of getting silently
    # dropped. Stage 5 will swap the renderer over to libghostty's
    # own Metal output.
    path: GhosttyVT

targets:
  Conduit:
    type: application
    platform: iOS
    sources:
      - path: Sources
        excludes:
          - "Resources/terminal/**"
      - path: ConduitCore/Sources
        optional: true
      - path: Sources/Assets.xcassets
      # Vendored xterm.js bundle. Added as a `folder` so the directory
      # structure (terminal/xterm.js, terminal.html, …) is preserved
      # inside the .app — WKTerminalView loads them with
      # Bundle.main.url(forResource: "terminal", withExtension: "html",
      # subdirectory: "terminal").
      - path: Sources/Resources/terminal
        type: folder
        buildPhase: resources
    dependencies:
      - framework: ConduitCore/ConduitCore.xcframework
        embed: true
        codeSign: true
      - package: Sentry
      - package: HighlightSwift
      - package: GhosttyVT
      # NOTE: Live Activity widget extension (ConduitWidgets) is built
      # by CI sim flow but intentionally NOT embedded in the release
      # IPA. Ad-hoc archive signing requires a separate provisioning
      # profile for the widget's bundle id (sh.nikhil.conduit.widgets)
      # and the release pipeline only ships the host-app profile. With
      # the widget embedded but unsigned, archive fails with
      # "Embedded binary is not signed with the same certificate as the
      # parent app." Until a widget provisioning profile is added to
      # the release workflow secrets, the embed dependency stays
      # disabled — the TurnLiveActivityController still calls
      # Activity.request(...) but iOS no-ops without the extension. See
      # docs/PLAN-TERMINAL-REWRITE.md / PR fix-widget-extension-signing.
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Conduit
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSCameraUsageDescription: "Scan Conduit pairing QR codes."
        NSPhotoLibraryUsageDescription: "Import a Conduit pairing QR code from your photo library."
        NSMicrophoneUsageDescription: "Dictate replies to the coding agent."
        NSSpeechRecognitionUsageDescription: "Transcribe your voice on-device into chat messages for the coding agent."
        NSLocalNetworkUsageDescription: "Discover Conduit harnesses advertising on your Wi-Fi."
        NSBonjourServices:
          - "_conduit._tcp"
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLName: sh.nikhil.conduit.pairing
            CFBundleURLSchemes:
              - conduit
        # Required by iOS so the app may call Activity.request(...) to
        # surface the active turn on the lock screen / Dynamic Island.
        # See apps/ios/Sources/Models/TurnLiveActivityController.swift.
        NSSupportsLiveActivities: true
        SentryDSN: $(SENTRY_DSN)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: sh.nikhil.conduit
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_MODULE_VERIFIER: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SENTRY_DSN: ""

  # Widget app-extension that renders the Turn Live Activity on the
  # lock screen and Dynamic Island. The controller in
  # Sources/Models/TurnLiveActivityController.swift calls
  # Activity.request(...) at runtime; without this extension target
  # iOS silently drops the request and no UI appears. The widget
  # re-compiles the same TurnActivityAttributes shape (Widgets/Shared
  # mirrors the model file via xcodegen `sources`) so both processes
  # agree on the Codable layout.
  ConduitWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.1"
    sources:
      - path: Widgets
      # ActivityAttributes type must be compiled into BOTH the host
      # app and the widget extension so the generic `Activity<TurnActivityAttributes>`
      # resolves to the same concrete type on either side of the system
      # boundary. The controller class itself stays in the host target —
      # it references `SessionStore` / `ConversationItem` which the
      # widget extension can't (and shouldn't) link.
      - path: Sources/Models/TurnActivityModel.swift
      - path: Sources/Models/TurnActivityAttributes.swift
    info:
      path: Widgets/Info.plist
      properties:
        CFBundleDisplayName: ConduitWidgets
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        # Modern WidgetKit extensions use a `@main WidgetBundle` —
        # no `NSExtensionPrincipalClass` needed. Just declare the
        # extension point so iOS routes the bundle.
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: sh.nikhil.conduit.widgets
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        GENERATE_INFOPLIST_FILE: NO
        SKIP_INSTALL: NO
        # Extension ships with the host .app and must not require its
        # own signing identity for sim/CI builds.
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO

  ConduitTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/ConduitTests
    dependencies:
      - target: Conduit
      - package: SnapshotTesting
        product: SnapshotTesting
      # Stage 3 SGR tests need to construct `TerminalCell` /
      # `SGRColor` / `SGRAttributes` values directly to exercise the
      # `renderColor` / `terminalCellWidth` helpers without standing up
      # libghostty. The app already links `GhosttyVT`; the test bundle
      # gets its own dep so `@testable import GhosttyVT` resolves.
      - package: GhosttyVT
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: sh.nikhil.conduit.tests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Conduit.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Conduit
        # Test target doesn't ship; skip the team-id requirement so
        # local + CI builds don't need signing material configured.
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO

schemes:
  Conduit:
    build:
      targets:
        Conduit: all
        # ConduitWidgets intentionally excluded from the scheme — see
        # the note on the Conduit target's dependencies block. The
        # widget target still exists so a future PR can re-add it once
        # release-ios.yml ships a widget provisioning profile.
        ConduitTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: false
      targets:
        - ConduitTests
    archive:
      config: Release
