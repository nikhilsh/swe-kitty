name: ci

on:
  pull_request:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:

  broker:
    name: broker (go)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: broker/go.sum
      - name: Skip if no Go code yet
        id: detect
        run: |
          if [ ! -f broker/go.mod ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Setup Node for sidecar
        if: steps.detect.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install sidecar deps
        if: steps.detect.outputs.skip != 'true' && hashFiles('broker/sidecar/package.json') != ''
        working-directory: broker/sidecar
        run: npm install --omit=dev --no-audit --no-fund
      - name: go vet
        if: steps.detect.outputs.skip != 'true'
        working-directory: broker
        run: go vet ./...
      - name: go test
        if: steps.detect.outputs.skip != 'true'
        working-directory: broker
        run: go test ./...
      - name: golangci-lint
        if: steps.detect.outputs.skip != 'true'
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: broker
          version: latest

  core:
    name: core (rust)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core
      - name: Skip if no Rust code yet
        id: detect
        run: |
          if [ ! -f core/Cargo.toml ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: cargo fmt
        if: steps.detect.outputs.skip != 'true'
        working-directory: core
        run: cargo fmt --check
      - name: cargo clippy
        if: steps.detect.outputs.skip != 'true'
        working-directory: core
        run: cargo clippy --all-targets -- -D warnings
      - name: cargo test
        if: steps.detect.outputs.skip != 'true'
        working-directory: core
        run: cargo test

  ios-build:
    name: ios sim build
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Skip if no iOS project yet
        id: detect
        run: |
          if [ ! -f apps/ios/project.yml ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Select Xcode 26.4.1
        if: steps.detect.outputs.skip != 'true'
        run: sudo xcode-select -s /Applications/Xcode_26.4.1.app
      - uses: dtolnay/rust-toolchain@stable
        if: steps.detect.outputs.skip != 'true'
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios
      - name: Install xcodegen
        if: steps.detect.outputs.skip != 'true'
        run: brew install xcodegen
      - name: Build Rust xcframework
        if: steps.detect.outputs.skip != 'true'
        working-directory: apps/ios
        run: ./build-rust.sh
      - name: Generate Xcode project
        if: steps.detect.outputs.skip != 'true'
        working-directory: apps/ios
        run: xcodegen generate
      - name: xcodebuild (simulator, no signing)
        if: steps.detect.outputs.skip != 'true'
        working-directory: apps/ios
        env:
          SENTRY_DSN_IOS: ${{ secrets.SENTRY_DSN_IOS }}
        run: |
          xcodebuild -scheme SweKitty \
            -destination 'generic/platform=iOS Simulator' \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            SENTRY_DSN="$SENTRY_DSN_IOS" \
            build
      - name: xcodebuild test (SweKittyTests, simulator)
        if: steps.detect.outputs.skip != 'true' && hashFiles('apps/ios/Tests/SweKittyTests/**/*.swift') != ''
        working-directory: apps/ios
        env:
          SENTRY_DSN_IOS: ${{ secrets.SENTRY_DSN_IOS }}
        run: |
          # Find an available simulator on this runner. macos-26 doesn't
          # guarantee any specific named device pre-installed, so we
          # introspect first and feed the UDID directly to xcodebuild —
          # avoids "Unable to find a device matching" failures when the
          # runner's device names drift from what the workflow hardcodes.
          DEVICE_UDID=$(xcrun simctl list devices available --json \
            | python3 -c "import json,sys; d=json.load(sys.stdin)['devices']; \
                          ids=[v['udid'] for k,vs in d.items() if 'iOS' in k for v in vs if v.get('isAvailable')]; \
                          print(ids[0] if ids else '')")
          if [ -z "$DEVICE_UDID" ]; then
            echo "no iOS simulator available — listing for debug:" >&2
            xcrun simctl list devices available >&2
            exit 1
          fi
          xcodebuild -scheme SweKitty \
            -destination "platform=iOS Simulator,id=$DEVICE_UDID" \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            -resultBundlePath build/SweKitty.xcresult \
            SENTRY_DSN="$SENTRY_DSN_IOS" \
            test
      - name: Upload xcresult bundle on test failure
        if: failure() && steps.detect.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ios-xcresult
          path: apps/ios/build/SweKitty.xcresult
          # 14 days is enough for a PR to land; longer just costs storage.
          retention-days: 14
          if-no-files-found: ignore

  android-build:
    name: android debug build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Skip if no Android project yet
        id: detect
        run: |
          if [ ! -f apps/android/build.gradle.kts ] && [ ! -f apps/android/build.gradle ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-java@v4
        if: steps.detect.outputs.skip != 'true'
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
        if: steps.detect.outputs.skip != 'true'
      - name: Install Android NDK
        if: steps.detect.outputs.skip != 'true'
        run: sdkmanager "ndk;26.3.11579264"
      - uses: dtolnay/rust-toolchain@stable
        if: steps.detect.outputs.skip != 'true'
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android
      - uses: Swatinem/rust-cache@v2
        if: steps.detect.outputs.skip != 'true'
        with:
          workspaces: core
      - name: Install cargo-ndk
        if: steps.detect.outputs.skip != 'true'
        run: cargo install cargo-ndk --version ^3
      - name: Build Rust jniLibs
        if: steps.detect.outputs.skip != 'true'
        working-directory: apps/android
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.3.11579264
        run: ./build-rust.sh
      - name: gradle assembleDebug
        if: steps.detect.outputs.skip != 'true'
        working-directory: apps/android
        env:
          SENTRY_DSN_ANDROID: ${{ secrets.SENTRY_DSN_ANDROID }}
        run: ./gradlew assembleDebug --no-daemon
      - name: gradle unit tests
        if: steps.detect.outputs.skip != 'true' && hashFiles('apps/android/app/src/test/**/*.kt') != ''
        working-directory: apps/android
        run: ./gradlew :app:testDebugUnitTest --no-daemon
      - name: Upload test + Roborazzi reports on failure
        if: failure() && steps.detect.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: android-test-reports
          # JUnit reports + Roborazzi snapshot output (compare/diff
          # PNGs) live under standard gradle paths. Both get included
          # so an agent reviewing the PR can read failure detail and
          # visual diffs without re-running CI locally.
          path: |
            apps/android/app/build/reports/tests
            apps/android/app/build/outputs/roborazzi
            apps/android/app/src/test/snapshots
          retention-days: 14
          if-no-files-found: ignore

  docs-claims:
    name: docs claim lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Verify README "Done" claims have code evidence
        # Lightweight reconciliation guard: README's `### Done` section
        # name-drops specific Swift / Kotlin types. If a name is gone
        # from `apps/` the README is lying — fail the build so the next
        # docs-reconciliation PR catches it at the source.
        run: |
          set -e
          claims=(ConversationToolCard ConversationDiffBlock QuickReplyDetector
                  PendingInputCard LitterPendingInputCard SubagentCard HandoffCard)
          missing=()
          for c in "${claims[@]}"; do
            if ! grep -RIlq --include='*.swift' --include='*.kt' "$c" apps/; then
              missing+=("$c")
            fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "README claims types not found in apps/: ${missing[*]}" >&2
            exit 1
          fi
