name: release
run-name: release (${{ github.event.inputs.release_tag || github.ref_name }})

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag/name to publish assets under (no git tag required)
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.release_tag || github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: resolve tag + ensure release
    runs-on: ubuntu-24.04
    outputs:
      release_tag: ${{ steps.tag.outputs.value }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history (not the default shallow tag checkout) so the
          # provenance backstop below can ask whether origin/main contains
          # the tagged commit.
          fetch-depth: 0
      - name: Verify tagged commit is on origin/main
        # Backstop for scripts/cut-release.sh: refuse to build a tag whose
        # commit isn't reachable from origin/main. Prevents the v0.0.35
        # stale-tag class of incident even if someone tags by hand. Only
        # runs for real tag pushes; workflow_dispatch can ship arbitrary refs.
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          # Use FETCH_HEAD (the just-fetched tip of main) rather than the
          # remote-tracking origin/main ref, which isn't reliably populated
          # after a tag-ref checkout.
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" FETCH_HEAD; then
            echo "tagged commit $GITHUB_SHA is not contained in origin/main — refusing to release a stale/off-main tag" >&2
            exit 1
          fi
          echo "tagged commit $GITHUB_SHA is on origin/main"
      - name: Resolve release tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.release_tag }}" ]; then
            tag="${{ github.event.inputs.release_tag }}"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="manual-${GITHUB_SHA::7}-${GITHUB_RUN_NUMBER}"
          fi
          echo "value=$tag" >> "$GITHUB_OUTPUT"
      - name: Create release if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.tag.outputs.value }}
        run: |
          if ! gh release view "${RELEASE_TAG}" -R "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "${RELEASE_TAG}" -R "$GITHUB_REPOSITORY" \
              --target "${GITHUB_SHA}" \
              --title "swe-kitty ${RELEASE_TAG}" \
              --notes "Auto-generated release. See workflow logs for build provenance." \
              || gh release view "${RELEASE_TAG}" -R "$GITHUB_REPOSITORY" >/dev/null
          else
            echo "release ${RELEASE_TAG} already exists - leaving as is"
          fi

  ios:
    name: ios
    needs: prepare
    uses: ./.github/workflows/release-ios.yml
    with:
      release_tag: ${{ needs.prepare.outputs.release_tag }}
    secrets: inherit

  android:
    name: android
    needs: prepare
    uses: ./.github/workflows/release-android.yml
    with:
      release_tag: ${{ needs.prepare.outputs.release_tag }}
    secrets: inherit

  broker:
    name: broker
    needs: prepare
    uses: ./.github/workflows/release-broker.yml
    with:
      release_tag: ${{ needs.prepare.outputs.release_tag }}
    secrets: inherit

  deploy-website:
    name: deploy website to Fyra
    needs: [prepare, ios, android, broker]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          release_json="$(gh release view "${RELEASE_TAG}" -R "$GITHUB_REPOSITORY" --json assets,tagName,url)"
          echo "${release_json}" | jq '.assets | map(.name)'
          missing=()
          for required in \
            SweKitty.ipa \
            app-release.apk \
            swe-kitty-broker-linux-amd64 \
            swe-kitty-broker-linux-arm64 \
            swe-kitty-broker-darwin-amd64 \
            swe-kitty-broker-darwin-arm64; do
            if ! jq -e --arg name "$required" '.assets[] | select(.name == $name)' >/dev/null <<<"$release_json"; then
              missing+=("$required")
            fi
          done
          if [ "${#missing[@]}" -ne 0 ]; then
            echo "release ${RELEASE_TAG} missing assets: ${missing[*]}" >&2
            exit 1
          fi
          echo "release ${RELEASE_TAG} has all required assets"

      - uses: actions/setup-node@v4
        with:
          # No node_modules or package-lock.json — the website is now a
          # plain static generator (`website/build.mjs`) with zero deps.
          # We only need Node itself for fetch() and the build script.
          node-version: '20'

      - name: Install Fyra CLI
        run: curl -fsSL https://fyra.sh/install.sh | sh

      - name: Configure Fyra auth
        env:
          FYRA_TOKEN: ${{ secrets.FYRA_TOKEN }}
          FYRA_SERVER: ${{ secrets.FYRA_SERVER }}
        run: |
          mkdir -p "$HOME/.fyra"
          cat > "$HOME/.fyra/config.yaml" <<EOF
          server_address: ${FYRA_SERVER:-server.fyra.sh:50051}
          token: ${FYRA_TOKEN}
          EOF

      - name: Build website against latest release
        working-directory: website
        env:
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node build.mjs

      - name: Deploy website to Fyra
        working-directory: website/out
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          # `.deploy.yaml` is already written by build.mjs with the right
          # slug + domain — no `fyra link` round-trip needed. `script`
          # provides a PTY so fyra's progress bar doesn't error out.
          script -q -e -c "fyra push" /dev/null
