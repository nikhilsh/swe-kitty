name: release-harness

on:
  workflow_dispatch:
  push:
    tags: ['v*']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  ensure-release:
    name: ensure GitHub Release exists
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Create release if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view "${{ github.ref_name }}" -R "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "${{ github.ref_name }}" -R "$GITHUB_REPOSITORY" \
              --title "swe-kitty ${{ github.ref_name }}" \
              --notes "Auto-generated release. See workflow logs for build provenance."
          else
            echo "release ${{ github.ref_name }} already exists — leaving as is"
          fi

  build-binaries:
    name: cross-compile harness
    needs: ensure-release
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - { goos: linux,  goarch: amd64 }
          - { goos: linux,  goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        if: hashFiles('harness/go.mod') != ''
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        working-directory: harness
        run: |
          mkdir -p dist
          go build -trimpath -ldflags "-s -w -X main.version=${{ github.ref_name }}" \
            -o dist/swe-kitty-harness-${GOOS}-${GOARCH} ./cmd/swe-kitty-harness

      - name: Upload to GitHub Release
        if: hashFiles('harness/go.mod') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            harness/dist/swe-kitty-harness-${{ matrix.goos }}-${{ matrix.goarch }} \
            --clobber

  upload-installer:
    name: upload install.sh
    runs-on: ubuntu-24.04
    needs: build-binaries
    steps:
      - uses: actions/checkout@v4
      - name: Upload install.sh if present
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f scripts/install.sh ]; then
            gh release upload "${{ github.ref_name }}" scripts/install.sh --clobber
          else
            echo "no scripts/install.sh yet — skipping"
          fi
