name: release-harness
run-name: release-harness (${{ github.event.inputs.release_tag || github.ref_name }})

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag/name to publish assets under (no git tag required)
        required: false
        type: string
  push:
    tags: ['v*']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  ensure-release:
    name: ensure GitHub Release exists
    runs-on: ubuntu-24.04
    outputs:
      release_tag: ${{ steps.release-tag.outputs.value }}
    steps:
      - uses: actions/checkout@v4
      - name: Resolve release tag
        id: release-tag
        run: |
          if [ -n "${{ github.event.inputs.release_tag }}" ]; then
            tag="${{ github.event.inputs.release_tag }}"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="manual-${GITHUB_SHA::7}-${GITHUB_RUN_NUMBER}"
          fi
          echo "value=$tag" >> "$GITHUB_OUTPUT"
      - name: Create release if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release-tag.outputs.value }}
        run: |
          if ! gh release view "${RELEASE_TAG}" -R "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "${RELEASE_TAG}" -R "$GITHUB_REPOSITORY" \
              --target "${GITHUB_SHA}" \
              --title "swe-kitty ${RELEASE_TAG}" \
              --notes "Auto-generated release. See workflow logs for build provenance." \
              || gh release view "${RELEASE_TAG}" -R "$GITHUB_REPOSITORY" >/dev/null
          else
            echo "release ${RELEASE_TAG} already exists — leaving as is"
          fi

  build-binaries:
    name: cross-compile harness
    needs: ensure-release
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - { goos: linux,  goarch: amd64 }
          - { goos: linux,  goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        if: hashFiles('harness/go.mod') != ''
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
          RELEASE_TAG: ${{ needs.ensure-release.outputs.release_tag }}
        working-directory: harness
        run: |
          mkdir -p dist
          go build -trimpath -ldflags "-s -w -X main.version=${RELEASE_TAG}" \
            -o dist/swe-kitty-harness-${GOOS}-${GOARCH} ./cmd/swe-kitty-harness

      - name: Upload to GitHub Release
        if: hashFiles('harness/go.mod') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.ensure-release.outputs.release_tag }}
        run: |
          gh release upload "${RELEASE_TAG}" \
            harness/dist/swe-kitty-harness-${{ matrix.goos }}-${{ matrix.goarch }} \
            --clobber

  upload-installer:
    name: upload install.sh
    runs-on: ubuntu-24.04
    needs: build-binaries
    steps:
      - uses: actions/checkout@v4
      - name: Upload install.sh if present
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.ensure-release.outputs.release_tag }}
        run: |
          if [ -f scripts/install.sh ]; then
            gh release upload "${RELEASE_TAG}" scripts/install.sh --clobber
          else
            echo "no scripts/install.sh yet — skipping"
          fi
