name: release-harness

on:
  workflow_call:
    inputs:
      release_tag:
        description: Release tag/name to publish assets under
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-binaries:
    name: cross-compile harness
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - { goos: linux,  goarch: amd64 }
          - { goos: linux,  goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        if: hashFiles('harness/go.mod') != ''
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
          RELEASE_TAG: ${{ inputs.release_tag }}
        working-directory: harness
        run: |
          mkdir -p dist
          go build -trimpath -ldflags "-s -w -X main.version=${RELEASE_TAG}" \
            -o dist/swe-kitty-harness-${GOOS}-${GOARCH} ./cmd/swe-kitty-harness

      - name: Upload to GitHub Release
        if: hashFiles('harness/go.mod') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          gh release upload "${RELEASE_TAG}" \
            harness/dist/swe-kitty-harness-${{ matrix.goos }}-${{ matrix.goarch }} \
            --clobber

  upload-installer:
    name: upload install.sh
    runs-on: ubuntu-24.04
    needs: build-binaries
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Upload install.sh if present
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          if [ -f scripts/install.sh ]; then
            gh release upload "${RELEASE_TAG}" scripts/install.sh --clobber
          else
            echo "no scripts/install.sh yet — skipping"
          fi
