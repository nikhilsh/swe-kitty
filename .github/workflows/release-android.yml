name: release-android

on:
  workflow_dispatch:
  push:
    tags: ['v*']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  ensure-release:
    name: ensure GitHub Release exists
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Create release if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view "${{ github.ref_name }}" -R "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "${{ github.ref_name }}" -R "$GITHUB_REPOSITORY" \
              --title "swe-kitty ${{ github.ref_name }}" \
              --notes "Auto-generated release. See workflow logs for build provenance." \
              || gh release view "${{ github.ref_name }}" -R "$GITHUB_REPOSITORY" >/dev/null
          else
            echo "release ${{ github.ref_name }} already exists - leaving as is"
          fi

  build-apk:
    name: signed APK
    needs: ensure-release
    runs-on: ubuntu-24.04
    env:
      ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/apps/android/app/release.keystore
      ANDROID_KEYSTORE_PASSWORD: android
      ANDROID_KEY_ALIAS: androiddebugkey
      ANDROID_KEY_PASSWORD: android
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Prepare test signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          fallback_keystore() {
            rm -f "$ANDROID_KEYSTORE_PATH"
            keytool -genkeypair \
              -v \
              -keystore "$ANDROID_KEYSTORE_PATH" \
              -storepass "$ANDROID_KEYSTORE_PASSWORD" \
              -alias "$ANDROID_KEY_ALIAS" \
              -keypass "$ANDROID_KEY_PASSWORD" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=SweKitty Debug,O=SweKitty,C=US"
            echo "generated ephemeral Android test keystore"
          }

          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$ANDROID_KEYSTORE_PATH"
            if keytool -list \
              -keystore "$ANDROID_KEYSTORE_PATH" \
              -storepass "$ANDROID_KEYSTORE_PASSWORD" \
              >/dev/null 2>&1; then
              echo "using repository-provided Android keystore"
            else
              echo "repository-provided Android keystore is invalid for current credentials; falling back"
              fallback_keystore
            fi
          else
            fallback_keystore
          fi

      - name: Override signing env from secrets when present
        env:
          SECRET_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          SECRET_ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          SECRET_ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$SECRET_ANDROID_KEYSTORE_PASSWORD" ]; then
            echo "ANDROID_KEYSTORE_PASSWORD=$SECRET_ANDROID_KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
          fi
          if [ -n "$SECRET_ANDROID_KEY_ALIAS" ]; then
            echo "ANDROID_KEY_ALIAS=$SECRET_ANDROID_KEY_ALIAS" >> "$GITHUB_ENV"
          fi
          if [ -n "$SECRET_ANDROID_KEY_PASSWORD" ]; then
            echo "ANDROID_KEY_PASSWORD=$SECRET_ANDROID_KEY_PASSWORD" >> "$GITHUB_ENV"
          fi

      - name: Build Rust jniLibs
        working-directory: apps/android
        run: ./build-rust.sh

      - name: gradle assembleRelease
        working-directory: apps/android
        env:
          SENTRY_DSN_ANDROID: ${{ secrets.SENTRY_DSN_ANDROID }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APK_PATH="$(find apps/android/app/build/outputs/apk/release -maxdepth 1 -name 'app-release*.apk' | head -n 1)"
          test -n "$APK_PATH"
          gh release upload "${{ github.ref_name }}" \
            "$APK_PATH" \
            --clobber
