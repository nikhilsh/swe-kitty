name: release-android

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  ensure-release:
    name: ensure GitHub Release exists
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Create release if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view "${{ github.ref_name }}" -R "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "${{ github.ref_name }}" -R "$GITHUB_REPOSITORY" \
              --title "swe-kitty ${{ github.ref_name }}" \
              --notes "Auto-generated release. See workflow logs for build provenance."
          else
            echo "release ${{ github.ref_name }} already exists - leaving as is"
          fi

  build-apk:
    name: signed APK
    needs: ensure-release
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > apps/android/app/release.keystore

      - name: Build Rust jniLibs
        working-directory: apps/android
        run: ./build-rust.sh

      - name: gradle assembleRelease
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/apps/android/app/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        working-directory: apps/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APK_PATH="$(find apps/android/app/build/outputs/apk/release -maxdepth 1 -name 'app-release*.apk' | head -n 1)"
          test -n "$APK_PATH"
          gh release upload "${{ github.ref_name }}" \
            "$APK_PATH" \
            --clobber
