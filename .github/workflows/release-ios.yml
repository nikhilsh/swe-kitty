name: release-ios

on:
  workflow_call:
    inputs:
      release_tag:
        description: Release tag/name to publish assets under
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-ipa:
    name: ad-hoc signed IPA
    runs-on: macos-26
    permissions:
      contents: write
    env:
      APP_NAME: SweKitty
      SCHEME: SweKitty
      CONFIGURATION: Release
      BUNDLE_ID: sh.nikhil.swekitty
      TEAM_ID: EHW7L3679R
      PROJECT_PATH: apps/ios/SweKitty.xcodeproj
      ARCHIVE_PATH: ${{ github.workspace }}/apps/ios/build/SweKitty.xcarchive
      EXPORT_PATH: ${{ github.workspace }}/apps/ios/build/export
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      SENTRY_PROJECT_IOS: ${{ secrets.SENTRY_PROJECT_IOS }}
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26.4.1
        run: sudo xcode-select -s /Applications/Xcode_26.4.1.app

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Decode signing assets
        env:
          IOS_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p "$RUNNER_TEMP/signing"
          echo "$IOS_CERTIFICATE_P12_BASE64"     | base64 --decode > "$RUNNER_TEMP/signing/cert.p12"
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$RUNNER_TEMP/signing/profile.mobileprovision"

      - name: Install provisioning profile (by UUID)
        run: |
          PROFILE_SRC="$RUNNER_TEMP/signing/profile.mobileprovision"
          security cms -D -i "$PROFILE_SRC" > "$RUNNER_TEMP/signing/profile.plist"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' "$RUNNER_TEMP/signing/profile.plist")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print Name' "$RUNNER_TEMP/signing/profile.plist")
          echo "PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"
          echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_SRC" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

      - name: Create temp keychain + import cert
        env:
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          security create-keychain -p "$IOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$IOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/signing/cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$IOS_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple: -s -k "$IOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Build Rust xcframework
        working-directory: apps/ios
        run: ./build-rust.sh

      - name: Inject signing settings into app target
        working-directory: apps/ios
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("project.yml")
          text = path.read_text()
          marker = "        ENABLE_MODULE_VERIFIER: NO\n"
          replacement = (
              "        ENABLE_MODULE_VERIFIER: NO\n"
              "        CODE_SIGN_STYLE: Manual\n"
              "        CODE_SIGN_IDENTITY: Apple Distribution\n"
              "        DEVELOPMENT_TEAM: ${TEAM_ID}\n"
              "        PROVISIONING_PROFILE_SPECIFIER: ${PROFILE_NAME}\n"
          )
          if marker not in text:
              raise SystemExit("expected project.yml target settings marker not found")
          path.write_text(text.replace(marker, replacement, 1))
          PY

      - name: Generate Xcode project
        working-directory: apps/ios
        run: xcodegen generate

      - name: Generate ExportOptions.plist
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>ad-hoc</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_ID}</key>
              <string>${PROFILE_NAME}</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>thinning</key>
            <string>&lt;none&gt;</string>
          </dict>
          </plist>
          PLIST

      - name: Archive
        env:
          SENTRY_DSN_IOS: ${{ secrets.SENTRY_DSN_IOS }}
        run: |
          xcodebuild archive \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -archivePath "$ARCHIVE_PATH" \
            -destination 'generic/platform=iOS' \
            SENTRY_DSN="$SENTRY_DSN_IOS" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID"

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

      - name: Install sentry-cli
        if: ${{ env.SENTRY_AUTH_TOKEN != '' && env.SENTRY_ORG != '' && env.SENTRY_PROJECT_IOS != '' }}
        run: |
          curl -sL https://sentry.io/get-cli/ | SENTRY_CLI_VERSION="2.40.0" sh

      - name: Upload dSYMs to Sentry
        if: ${{ env.SENTRY_AUTH_TOKEN != '' && env.SENTRY_ORG != '' && env.SENTRY_PROJECT_IOS != '' }}
        run: |
          test -d "$ARCHIVE_PATH/dSYMs"
          sentry-cli debug-files upload \
            --auth-token "$SENTRY_AUTH_TOKEN" \
            --org "$SENTRY_ORG" \
            --project "$SENTRY_PROJECT_IOS" \
            --include-sources \
            "$ARCHIVE_PATH/dSYMs"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SweKitty-ipa-${{ inputs.release_tag }}
          path: ${{ env.EXPORT_PATH }}/SweKitty.ipa

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          gh release upload "${RELEASE_TAG}" \
            "$EXPORT_PATH/SweKitty.ipa" --clobber
